<header class="sticky top-0 z-50 border-b border-zinc-200/90 bg-white/90 backdrop-blur-xl supports-[backdrop-filter]:bg-white/80">
  <div class="container flex min-h-[72px] items-center justify-between gap-3 py-2 sm:gap-4">
    <a href="/" class="group flex shrink-0 items-center gap-2.5 font-semibold tracking-tight text-zinc-900 sm:gap-3">
      <span class="flex h-10 w-10 items-center justify-center rounded-md border border-red-200 bg-white text-sm font-semibold tabular-nums text-primary shadow-sm">NS</span>
      <span class="hidden flex-col text-sm leading-tight sm:flex">
        <span>Nangsec Technologies</span>
        <span class="text-[10px] font-normal uppercase tracking-[0.18em] text-zinc-500">Cybersecurity</span>
      </span>
    </a>

    <nav class="hidden min-w-0 flex-1 items-center justify-center px-2 lg:flex" aria-label="Primary">
      <div class="inline-flex max-w-full items-center gap-0.5 overflow-x-auto rounded-xl border border-zinc-200/90 bg-zinc-50/70 p-1 shadow-sm [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
        <a href="/" class="inline-flex shrink-0 items-center gap-1.5 whitespace-nowrap rounded-lg px-3 py-2 text-sm font-medium transition <%= currentPath === '/' ? 'bg-white text-primary shadow-sm ring-1 ring-red-100' : 'text-zinc-600 hover:bg-white/80 hover:text-zinc-900' %>">
          <i data-feather="home" class="h-4 w-4 opacity-80"></i>
          Home
        </a>

        <details class="relative shrink-0 group">
          <summary class="list-none cursor-pointer whitespace-nowrap rounded-lg px-3 py-2 text-sm font-medium text-zinc-600 transition marker:content-none hover:bg-white/80 hover:text-zinc-900 [&::-webkit-details-marker]:hidden <%= currentPath.startsWith('/services') ? 'bg-white text-primary shadow-sm ring-1 ring-red-100' : '' %>">
            <span class="inline-flex items-center gap-1.5">
              <i data-feather="layers" class="h-4 w-4 opacity-80"></i>
              Services
              <i data-feather="chevron-down" class="h-3.5 w-3.5 opacity-50"></i>
            </span>
          </summary>
          <div class="absolute left-0 top-full z-50 mt-2 w-[min(100vw-2rem,380px)] rounded-xl border border-zinc-200 bg-white p-3 shadow-xl ring-1 ring-zinc-100">
            <p class="mb-2 flex items-center gap-2 px-2 text-[11px] font-semibold uppercase tracking-widest text-zinc-500">
              <i data-feather="grid" class="h-3.5 w-3.5"></i>
              Practice areas
            </p>
            <ul class="grid gap-1 text-sm">
              <li><a class="flex items-center gap-2 rounded-lg px-3 py-2.5 text-zinc-700 hover:bg-red-50" href="/services#assessment"><i data-feather="search" class="h-4 w-4 shrink-0 text-primary/80"></i>Security Assessment</a></li>
              <li><a class="flex items-center gap-2 rounded-lg px-3 py-2.5 text-zinc-700 hover:bg-red-50" href="/services#managed"><i data-feather="activity" class="h-4 w-4 shrink-0 text-primary/80"></i>Managed Security</a></li>
              <li><a class="flex items-center gap-2 rounded-lg px-3 py-2.5 text-zinc-700 hover:bg-red-50" href="/services#specialized"><i data-feather="target" class="h-4 w-4 shrink-0 text-primary/80"></i>Specialized Programs</a></li>
              <li><a class="flex items-center gap-2 rounded-lg px-3 py-2.5 text-zinc-700 hover:bg-red-50" href="/services#compliance"><i data-feather="clipboard" class="h-4 w-4 shrink-0 text-primary/80"></i>Compliance &amp; Advisory</a></li>
              <li class="mt-1 border-t border-zinc-100 pt-2"><a class="flex items-center gap-2 rounded-lg px-3 py-2 font-semibold text-primary hover:bg-zinc-50" href="/services"><i data-feather="arrow-right" class="h-4 w-4"></i>All services</a></li>
            </ul>
          </div>
        </details>

        <span class="mx-0.5 hidden h-6 w-px shrink-0 bg-zinc-200/90 sm:block" aria-hidden="true"></span>

        <a href="/training" class="inline-flex shrink-0 items-center gap-1.5 whitespace-nowrap rounded-lg px-3 py-2 text-sm font-medium transition <%= currentPath.startsWith('/training') ? 'bg-white text-primary shadow-sm ring-1 ring-red-100' : 'text-zinc-600 hover:bg-white/80 hover:text-zinc-900' %>">
          <i data-feather="book-open" class="h-4 w-4 opacity-80"></i>
          Training
        </a>
        <a href="/research" class="inline-flex shrink-0 items-center gap-1.5 whitespace-nowrap rounded-lg px-3 py-2 text-sm font-medium transition <%= currentPath.startsWith('/research') ? 'bg-white text-primary shadow-sm ring-1 ring-red-100' : 'text-zinc-600 hover:bg-white/80 hover:text-zinc-900' %>">
          <i data-feather="file-text" class="h-4 w-4 opacity-80"></i>
          Research
        </a>
        <a href="/about" class="inline-flex shrink-0 items-center gap-1.5 whitespace-nowrap rounded-lg px-3 py-2 text-sm font-medium transition <%= currentPath.startsWith('/about') ? 'bg-white text-primary shadow-sm ring-1 ring-red-100' : 'text-zinc-600 hover:bg-white/80 hover:text-zinc-900' %>">
          <i data-feather="users" class="h-4 w-4 opacity-80"></i>
          About
        </a>
      </div>
    </nav>

    <div class="hidden shrink-0 items-center sm:gap-3 lg:flex">
      <a href="/contact" class="inline-flex items-center gap-2 rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white shadow-md shadow-red-200/60 transition hover:bg-red-600">
        <i data-feather="message-circle" class="h-4 w-4 shrink-0"></i>
        Contact
      </a>
    </div>

    <button type="button" id="navToggle" class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-lg border border-zinc-200 bg-white text-zinc-800 shadow-sm lg:hidden" aria-label="Open menu" aria-expanded="false" aria-controls="mobileNav">
      <span id="navIconMenu" class="inline-flex text-zinc-800"><i data-feather="menu" class="h-5 w-5"></i></span>
      <span id="navIconClose" class="hidden inline-flex text-zinc-800"><i data-feather="x" class="h-5 w-5"></i></span>
    </button>
  </div>

  <div id="mobileNav" class="hidden border-t border-zinc-200 bg-white lg:hidden">
    <div class="container py-4">
      <p class="mb-2 px-1 text-[11px] font-semibold uppercase tracking-widest text-zinc-400">Menu</p>
      <div class="grid gap-1">
        <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-zinc-800 hover:bg-zinc-50" href="/"><i data-feather="home" class="h-4 w-4 text-zinc-400"></i>Home</a>
        <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-zinc-800 hover:bg-zinc-50" href="/services"><i data-feather="layers" class="h-4 w-4 text-zinc-400"></i>Services</a>
        <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-zinc-800 hover:bg-zinc-50" href="/training"><i data-feather="book-open" class="h-4 w-4 text-zinc-400"></i>Training</a>
        <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-zinc-800 hover:bg-zinc-50" href="/research"><i data-feather="file-text" class="h-4 w-4 text-zinc-400"></i>Research</a>
        <a class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-zinc-800 hover:bg-zinc-50" href="/about"><i data-feather="users" class="h-4 w-4 text-zinc-400"></i>About</a>
      </div>
      <div class="mt-4 border-t border-zinc-100 pt-4">
        <a class="flex w-full items-center justify-center gap-2 rounded-lg bg-primary px-3 py-2.5 text-sm font-semibold text-white shadow-sm" href="/contact"><i data-feather="message-circle" class="h-4 w-4"></i>Contact</a>
      </div>
    </div>
  </div>
</header>
